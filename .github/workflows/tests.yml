name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # Aucune dépendance d'exécution : on lance directement les suites de tests.
      - name: Lancer les tests
        run: npm test
